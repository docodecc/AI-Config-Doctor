name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: ai-config-doctor
            asset_name: ai-config-doctor-macos-arm64
          - os: macos-15-intel
            artifact_name: ai-config-doctor
            asset_name: ai-config-doctor-macos-x64
          - os: windows-latest
            artifact_name: ai-config-doctor.exe
            asset_name: ai-config-doctor-windows-x64.exe
          - os: ubuntu-latest
            artifact_name: ai-config-doctor
            asset_name: ai-config-doctor-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: pyinstaller ai-config-doctor.spec

      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Create macOS installer package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_ROOT="pkg-root"
          mkdir -p "$PKG_ROOT/usr/local/bin" "$PKG_ROOT/Applications"
          cp "dist/${{ matrix.asset_name }}" "$PKG_ROOT/usr/local/bin/ai-config-doctor"
          cat > "$PKG_ROOT/Applications/AI Config Doctor.command" <<'SCRIPT'
          #!/bin/zsh
          /usr/local/bin/ai-config-doctor
          echo
          echo "Press Enter to close this window..."
          read -r _
          SCRIPT
          chmod +x "$PKG_ROOT/usr/local/bin/ai-config-doctor" "$PKG_ROOT/Applications/AI Config Doctor.command"
          pkgbuild             --root "$PKG_ROOT"             --identifier "cc.docode.ai-config-doctor"             --version "$VERSION"             --install-location "/"             "dist/${{ matrix.asset_name }}.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Upload macOS installer package
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}.pkg
          path: dist/${{ matrix.asset_name }}.pkg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd artifacts
          find . -maxdepth 2 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AI Config Doctor ${{ github.ref_name }}
          body: |
            ## AI Config Doctor ${{ github.ref_name }}

            Codex / Claude Code 第三方 API 配置诊断、安装向导与会话恢复工具，面向非技术用户。

            ### 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS Apple Silicon | `ai-config-doctor-macos-arm64` | M1/M2/M3/M4，`chmod +x` 后运行 |
            | macOS Apple Silicon 安装包 | `ai-config-doctor-macos-arm64.pkg` | 双击安装，安装后可运行 `ai-config-doctor` |
            | macOS Intel | `ai-config-doctor-macos-x64` | Intel Mac，`chmod +x` 后运行 |
            | macOS Intel 安装包 | `ai-config-doctor-macos-x64.pkg` | 双击安装，安装后可运行 `ai-config-doctor` |
            | Windows x64 | `ai-config-doctor-windows-x64.exe` | Windows 10/11 64 位，双击运行 |
            | Linux x64 | `ai-config-doctor-linux-x64` | `chmod +x` 后运行 |

            ### 使用

            下载对应平台文件后直接运行，无需安装 Python 或任何依赖。

            SHA256 校验值见 `SHA256SUMS.txt`。

            ---
            MIT License · by [docode.cc](https://docode.cc)
          files: |
            artifacts/ai-config-doctor-macos-arm64/ai-config-doctor-macos-arm64
            artifacts/ai-config-doctor-macos-arm64.pkg/ai-config-doctor-macos-arm64.pkg
            artifacts/ai-config-doctor-macos-x64/ai-config-doctor-macos-x64
            artifacts/ai-config-doctor-macos-x64.pkg/ai-config-doctor-macos-x64.pkg
            artifacts/ai-config-doctor-windows-x64.exe/ai-config-doctor-windows-x64.exe
            artifacts/ai-config-doctor-linux-x64/ai-config-doctor-linux-x64
            artifacts/SHA256SUMS.txt
